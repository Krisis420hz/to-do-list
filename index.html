<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do list</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="todo-list">
          <div class="title">
            <h2>To-Do List</h2>
            <img src="img/notepad.png" alt="notepad icon" />
          </div>
          <div class="row">
            <input
              type="text"
              id="input-field"
              class="input"
              placeholder="Add a task"
            />
            <button onclick="addTask()">Add</button>
          </div>
          <ul id="list-container" class="scroll">
            <!-- <li class="checked">Task 1</li>
            <li>Task 2</li>
            <li>Task 3</li> -->
          </ul>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
